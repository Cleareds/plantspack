name: Weekly Data Quality Audit

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run data quality audit
        run: |
          npx tsx -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);

          (async () => {
            console.log('=== PlantsPack Data Quality Audit ===');
            console.log('Date:', new Date().toISOString());

            // Total counts
            const { count: totalPlaces } = await supabase.from('places').select('id', { count: 'exact', head: true });
            const { count: fvCount } = await supabase.from('places').select('id', { count: 'exact', head: true }).eq('vegan_level', 'fully_vegan');
            const { count: recipeCount } = await supabase.from('posts').select('id', { count: 'exact', head: true }).eq('category', 'recipe').is('deleted_at', null);
            const { count: userCount } = await supabase.from('users').select('id', { count: 'exact', head: true });
            const { count: reviewCount } = await supabase.from('place_reviews').select('id', { count: 'exact', head: true }).is('deleted_at', null);

            console.log('\n--- Counts ---');
            console.log('Places:', totalPlaces);
            console.log('Fully vegan:', fvCount);
            console.log('Recipes:', recipeCount);
            console.log('Users:', userCount);
            console.log('Reviews:', reviewCount);

            // Check for chain restaurants that snuck in
            const chains = ['mcdonald', 'burger king', 'kfc', 'subway', 'starbucks', 'domino', 'pizza hut', 'taco bell', 'chipotle'];
            let chainCount = 0;
            let allPlaces = [];
            let offset = 0;
            while (true) {
              const { data } = await supabase.from('places').select('id, name, country').range(offset, offset + 999);
              if (!data || data.length === 0) break;
              allPlaces.push(...data);
              offset += 1000;
              if (data.length < 1000) break;
            }

            const chainFound = [];
            for (const p of allPlaces) {
              const lower = p.name.toLowerCase();
              if (chains.some(c => lower.includes(c))) {
                chainCount++;
                if (chainFound.length < 5) chainFound.push(p.name);
              }
            }
            console.log('\n--- Chain Check ---');
            console.log('Chain restaurants found:', chainCount);
            if (chainFound.length) console.log('Examples:', chainFound.join(', '));

            // Check for Russian places
            const { count: russianCount } = await supabase.from('places').select('id', { count: 'exact', head: true }).eq('country', 'Russia');
            console.log('Russian places:', russianCount);

            // Check for non-Latin city names
            const nonLatin = [];
            const cities = new Set();
            for (const p of allPlaces) {
              if (p.city) cities.add(p.city);
            }
            // Actually need city from places
            let offset2 = 0;
            const citySet = new Set();
            while (true) {
              const { data } = await supabase.from('places').select('city').not('city', 'is', null).range(offset2, offset2 + 999);
              if (!data || data.length === 0) break;
              data.forEach(p => citySet.add(p.city));
              offset2 += 1000;
              if (data.length < 1000) break;
            }
            for (const city of citySet) {
              if (/[^\u0000-\u007F\u00C0-\u024F\u1E00-\u1EFF]/.test(city)) {
                nonLatin.push(city);
              }
            }
            console.log('\n--- Non-Latin Cities ---');
            console.log('Count:', nonLatin.length);
            if (nonLatin.length) console.log('Cities:', nonLatin.slice(0, 10).join(', '));

            // Places missing key data
            const { count: noCity } = await supabase.from('places').select('id', { count: 'exact', head: true }).is('city', null);
            const { count: noCountry } = await supabase.from('places').select('id', { count: 'exact', head: true }).is('country', null);
            const { count: noDesc } = await supabase.from('places').select('id', { count: 'exact', head: true }).is('description', null);
            const { count: withImages } = await supabase.from('places').select('id', { count: 'exact', head: true }).not('main_image_url', 'is', null);

            console.log('\n--- Data Completeness ---');
            console.log('Missing city:', noCity);
            console.log('Missing country:', noCountry);
            console.log('Missing description:', noDesc);
            console.log('With images:', withImages, '/', totalPlaces, '(' + Math.round(withImages / totalPlaces * 100) + '%)');

            // Flagged places
            const { count: unreachable } = await supabase.from('places').select('id', { count: 'exact', head: true }).contains('tags', ['website_unreachable']);
            const { count: possiblyClosed } = await supabase.from('places').select('id', { count: 'exact', head: true }).contains('tags', ['possibly_closed']);
            const { count: reportedClosed } = await supabase.from('places').select('id', { count: 'exact', head: true }).contains('tags', ['community_report:permanently_closed']);
            const { count: reportedHours } = await supabase.from('places').select('id', { count: 'exact', head: true }).contains('tags', ['community_report:hours_wrong']);
            console.log('\n--- Flagged Places ---');
            console.log('Website unreachable:', unreachable);
            console.log('Possibly closed (auto-detected):', possiblyClosed);
            console.log('Reported closed (by users):', reportedClosed);
            console.log('Reported hours wrong (by users):', reportedHours);

            // Show reported closed places with names
            if (reportedClosed > 0) {
              const { data: closedPlaces } = await supabase.from('places').select('name, city, country, slug')
                .contains('tags', ['community_report:permanently_closed']).limit(20);
              console.log('Reported closed places:');
              (closedPlaces || []).forEach(p => console.log('  - ' + p.name + ' (' + p.city + ', ' + p.country + ') /place/' + p.slug));
            }

            // Pending corrections
            const { count: pendingCorrections } = await supabase.from('place_corrections').select('id', { count: 'exact', head: true }).eq('status', 'pending');
            console.log('\n--- Pending Actions ---');
            console.log('Pending corrections:', pendingCorrections);

            // Refresh materialized views
            await supabase.rpc('refresh_directory_views').catch(() => console.log('View refresh failed'));
            console.log('\nMaterialized views refreshed.');
            console.log('=== Audit Complete ===');
          })();
          "
