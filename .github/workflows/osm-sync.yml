name: Weekly OSM Sync

on:
  schedule:
    # Every Sunday at 5:00 AM UTC
    - cron: '0 5 * * 0'
  workflow_dispatch: # Manual trigger

jobs:
  osm-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Reports NEW vegan/vegan-friendly OSM places as candidates to Storage AND
      # (Option A) auto-imports the high-signal slice: diet:vegan=only / cuisine=vegan,
      # non-chain, deduped, inserted vegan_friendly + unverified, tagged
      # osm-auto-sync-<date> for one-line rollback. Everything else stays report-only.
      # Logic in scripts/osm-sync.mjs (User-Agent fix + WAF-safe tags + conservative level).
      - name: Fetch + auto-import new OSM vegan places
        run: node scripts/osm-sync.mjs --import
