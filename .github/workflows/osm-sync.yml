name: Weekly OSM Sync

on:
  schedule:
    # Every Sunday at 5:00 AM UTC
    - cron: '0 5 * * 0'
  workflow_dispatch: # Manual trigger

jobs:
  osm-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Reports NEW vegan/vegan-friendly OSM places as candidates to Storage
      # (does not auto-insert). Logic lives in scripts/osm-sync.mjs — it adds the
      # required User-Agent (the old inline version 406'd and silently reported 0)
      # plus the expanded WAF-safe tag set and conservative vegan_level.
      - name: Fetch new OSM vegan places
        run: node scripts/osm-sync.mjs
