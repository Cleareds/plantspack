name: Daily Database Backup

on:
  schedule:
    # Every day at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Backup places to Supabase Storage
        run: |
          npx tsx -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);

          (async () => {
            console.log('Starting backup...');
            let allPlaces = [];
            let offset = 0;
            while (true) {
              const { data } = await supabase.from('places').select('*').range(offset, offset + 999);
              if (!data || data.length === 0) break;
              allPlaces.push(...data);
              offset += 1000;
              if (data.length < 1000) break;
            }
            console.log('Places to backup:', allPlaces.length);

            const date = new Date().toISOString().split('T')[0];
            const blob = new Blob([JSON.stringify(allPlaces)], { type: 'application/json' });
            const { error } = await supabase.storage.from('backups').upload(
              'daily/places-' + date + '.json', blob, { upsert: true }
            );
            if (error) console.error('Backup error:', error.message);
            else console.log('Backup saved: daily/places-' + date + '.json');

            // Clean old backups (keep last 7 days)
            const { data: files } = await supabase.storage.from('backups').list('daily');
            if (files && files.length > 7) {
              const sorted = files.sort((a, b) => a.name.localeCompare(b.name));
              const toDelete = sorted.slice(0, files.length - 7).map(f => 'daily/' + f.name);
              await supabase.storage.from('backups').remove(toDelete);
              console.log('Cleaned', toDelete.length, 'old backups');
            }
          })();
          "
