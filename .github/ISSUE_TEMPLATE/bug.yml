name: Bug report
description: Something in the app or website is broken or behaving wrong.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: I tapped X and got an error / the page showed Y instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: false
  - type: input
    id: url
    attributes:
      label: Page URL (if on the website)
      placeholder: https://www.plantspack.com/place/...
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device / browser / app version
      placeholder: iPhone 15, Safari / Android app 1.x / Chrome on Windows
    validations:
      required: false
