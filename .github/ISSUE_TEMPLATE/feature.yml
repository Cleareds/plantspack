name: Feature idea
description: Suggest something PlantsPack could add or improve.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: What are you trying to do today that's harder than it should be?
    validations:
      required: false
