<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 280" fill="none">
  <g stroke="#2d7a3a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">

    <!-- ===== LEFT LEAVES (behind cow) ===== -->
    <!-- Leaf 1 - larger, angled left -->
    <path d="M52 230 C32 195, 20 155, 42 130 C64 105, 78 140, 62 180 C50 210, 52 230, 52 230Z" fill="#2d7a3a" stroke="#2d7a3a"/>
    <path d="M52 228 C46 200, 44 170, 48 145" stroke="#fff" stroke-width="2.5"/>

    <!-- Leaf 2 - smaller, angled right -->
    <path d="M72 232 C56 200, 50 170, 65 148 C80 126, 92 155, 82 185 C74 210, 72 232, 72 232Z" fill="#2d7a3a" stroke="#2d7a3a"/>
    <path d="M72 230 C70 205, 70 178, 72 158" stroke="#fff" stroke-width="2.5"/>

    <!-- ===== COW (main, background layer) ===== -->
    <!-- Cow body fill (white so pig/chicken overlap properly) -->
    <path d="M68 105 C68 85, 85 60, 115 50 C145 40, 185 38, 210 52
             L228 68 C238 60, 258 48, 272 52 C286 56, 290 72, 282 86
             C276 96, 264 100, 252 96 L240 108
             C236 130, 226 155, 210 170 L210 228
             L195 228 L195 180
             L175 228 L160 228 L160 185
             C140 195, 115 198, 98 195
             L98 228 L83 228 L83 190
             L68 228 L53 228 L60 175
             C55 155, 52 130, 68 105Z"
          fill="#fff" stroke="#2d7a3a"/>

    <!-- Cow shoulder mark -->
    <path d="M95 98 C88 108, 86 120, 90 130" fill="none" stroke="#2d7a3a" stroke-width="3.5"/>

    <!-- Cow udder area hint -->
    <path d="M130 192 C135 200, 145 200, 150 192" fill="none" stroke="#2d7a3a" stroke-width="3"/>

    <!-- ===== COW HEAD DETAILS ===== -->
    <!-- Horns -->
    <path d="M256 48 C250 30, 244 18, 248 8" fill="none"/>
    <path d="M274 46 C278 28, 284 18, 280 8" fill="none"/>

    <!-- Left ear -->
    <path d="M248 52 C238 42, 234 48, 240 56" fill="#fff"/>
    <!-- Right ear -->
    <path d="M284 50 C292 40, 296 46, 290 55" fill="#fff"/>

    <!-- Eyes -->
    <circle cx="256" cy="68" r="4" fill="#2d7a3a" stroke="none"/>
    <circle cx="276" cy="68" r="4" fill="#2d7a3a" stroke="none"/>

    <!-- Snout -->
    <ellipse cx="266" cy="84" rx="14" ry="10" fill="#fff" stroke="#2d7a3a"/>
    <!-- Nostrils -->
    <circle cx="260" cy="84" r="3" fill="#2d7a3a" stroke="none"/>
    <circle cx="272" cy="84" r="3" fill="#2d7a3a" stroke="none"/>

    <!-- ===== PIG (foreground, center) ===== -->
    <!-- Pig body -->
    <ellipse cx="148" cy="205" rx="42" ry="32" fill="#fff" stroke="#2d7a3a"/>

    <!-- Pig head -->
    <circle cx="148" cy="172" r="30" fill="#fff" stroke="#2d7a3a"/>

    <!-- Pig left ear -->
    <path d="M126 152 C118 132, 126 126, 134 140" fill="#fff" stroke="#2d7a3a"/>
    <path d="M129 148 C126 138, 130 134, 133 142" fill="none" stroke="#2d7a3a" stroke-width="2.5"/>

    <!-- Pig right ear -->
    <path d="M170 152 C178 132, 170 126, 162 140" fill="#fff" stroke="#2d7a3a"/>
    <path d="M167 148 C170 138, 166 134, 163 142" fill="none" stroke="#2d7a3a" stroke-width="2.5"/>

    <!-- Pig eyes -->
    <circle cx="138" cy="170" r="3.5" fill="#2d7a3a" stroke="none"/>
    <circle cx="158" cy="170" r="3.5" fill="#2d7a3a" stroke="none"/>

    <!-- Pig snout -->
    <ellipse cx="148" cy="186" rx="12" ry="8" fill="#fff" stroke="#2d7a3a"/>
    <!-- Pig snout spiral/nostril -->
    <path d="M142 186 C142 182, 148 180, 148 186 C148 190, 142 190, 142 186" fill="none" stroke="#2d7a3a" stroke-width="3"/>
    <circle cx="153" cy="185" r="2.5" fill="#2d7a3a" stroke="none"/>

    <!-- Pig front legs -->
    <line x1="128" y1="230" x2="128" y2="248" stroke="#2d7a3a"/>
    <line x1="140" y1="232" x2="140" y2="248" stroke="#2d7a3a"/>
    <!-- Pig back legs -->
    <line x1="156" y1="232" x2="156" y2="248" stroke="#2d7a3a"/>
    <line x1="168" y1="230" x2="168" y2="248" stroke="#2d7a3a"/>

    <!-- ===== CHICKEN (foreground, right of pig) ===== -->
    <!-- Chicken body -->
    <circle cx="220" cy="208" r="24" fill="#fff" stroke="#2d7a3a"/>

    <!-- Chicken head overlap with body -->
    <circle cx="220" cy="185" r="16" fill="#fff" stroke="#2d7a3a"/>

    <!-- Chicken beak -->
    <path d="M236 186 L242 183 L236 180" fill="#2d7a3a" stroke="#2d7a3a" stroke-width="2"/>

    <!-- Chicken comb -->
    <path d="M214 170 C216 164, 220 162, 222 166 C224 162, 228 164, 226 170" fill="#2d7a3a" stroke="none"/>

    <!-- Chicken eye -->
    <circle cx="224" cy="182" r="3" fill="#2d7a3a" stroke="none"/>

    <!-- Chicken wing -->
    <path d="M208 200 C200 208, 204 218, 212 216" fill="none" stroke="#2d7a3a" stroke-width="3"/>

    <!-- Chicken feet -->
    <line x1="214" y1="230" x2="212" y2="248" stroke="#2d7a3a"/>
    <path d="M206 248 L212 248 L218 248" fill="none" stroke="#2d7a3a" stroke-width="3"/>
    <line x1="226" y1="230" x2="228" y2="248" stroke="#2d7a3a"/>
    <path d="M222 248 L228 248 L234 248" fill="none" stroke="#2d7a3a" stroke-width="3"/>

    <!-- ===== RIGHT LEAVES ===== -->
    <!-- Leaf 3 -->
    <path d="M258 232 C272 200, 282 168, 268 148 C254 128, 240 155, 248 185 C254 210, 258 232, 258 232Z" fill="#2d7a3a" stroke="#2d7a3a"/>
    <path d="M258 228 C260 200, 262 178, 262 158" stroke="#fff" stroke-width="2.5"/>

    <!-- Leaf 4 -->
    <path d="M278 234 C296 205, 304 172, 292 150 C280 128, 264 152, 272 182 C278 208, 278 234, 278 234Z" fill="#2d7a3a" stroke="#2d7a3a"/>
    <path d="M278 230 C280 205, 282 180, 284 160" stroke="#fff" stroke-width="2.5"/>

    <!-- ===== GROUND LINE ===== -->
    <line x1="30" y1="248" x2="310" y2="248" stroke="#2d7a3a" stroke-width="5"/>

    <!-- Grass tufts -->
    <path d="M42 248 C42 248, 38 238, 42 234" fill="none"/>
    <path d="M48 248 C48 248, 52 236, 56 234" fill="none"/>
    <path d="M90 248 C90 248, 86 240, 88 236" fill="none"/>
    <path d="M96 248 C96 248, 100 238, 104 236" fill="none"/>
    <path d="M182 248 C182 248, 178 240, 180 236" fill="none"/>
    <path d="M250 248 C250 248, 246 240, 248 236" fill="none"/>
    <path d="M296 248 C296 248, 292 238, 294 234" fill="none"/>
    <path d="M302 248 C302 248, 306 236, 310 234" fill="none"/>
  </g>
</svg>
